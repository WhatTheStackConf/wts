version: "3.8"

services:
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PUBLIC_POCKETBASE_URL: ${PUBLIC_POCKETBASE_URL:-http://127.0.0.1:8090}
        VITE_POCKETBASE_URL: ${PUBLIC_POCKETBASE_URL:-http://127.0.0.1:8090}
        VITE_LISTMONK_LIST_ID: ${VITE_LISTMONK_LIST_ID:-2}
        VITE_TURNSTILE_SITE_KEY: ${VITE_TURNSTILE_SITE_KEY:-}
        PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-https://wts.sh}
    depends_on:
      pocketbase:
        condition: service_healthy
    environment:
      - POCKETBASE_URL=http://pocketbase:8090
      - POCKETBASE_SUPERUSER_EMAIL=${POCKETBASE_SUPERUSER_EMAIL:?POCKETBASE_SUPERUSER_EMAIL is required}
      - POCKETBASE_SUPERUSER_PASSWORD=${POCKETBASE_SUPERUSER_PASSWORD:?POCKETBASE_SUPERUSER_PASSWORD is required}
      - PUBLIC_POCKETBASE_URL=${PUBLIC_POCKETBASE_URL:-http://127.0.0.1:8090}
      - POCKETBASE_PUBLIC_URL=${PUBLIC_POCKETBASE_URL:-http://127.0.0.1:8090}
      - VITE_POCKETBASE_URL=${PUBLIC_POCKETBASE_URL:-http://127.0.0.1:8090}
      - PUBLIC_SITE_URL=${PUBLIC_SITE_URL:-https://wts.sh}
      - MCP_ALLOWED_ORIGINS=${MCP_ALLOWED_ORIGINS:-}
      - MCP_PUBLIC_RATE_WINDOW_MS=${MCP_PUBLIC_RATE_WINDOW_MS:-60000}
      - MCP_PUBLIC_BURST_LIMIT=${MCP_PUBLIC_BURST_LIMIT:-120}
      - MCP_PUBLIC_GLOBAL_LIMIT=${MCP_PUBLIC_GLOBAL_LIMIT:-1200}
      - MCP_PUBLIC_CONCURRENCY_LIMIT=${MCP_PUBLIC_CONCURRENCY_LIMIT:-48}
      # Coolify's reverse proxy overwrites X-Forwarded-For before requests reach this container.
      - MCP_TRUST_PROXY=${MCP_TRUST_PROXY:-true}
      - GAMIFICATION_CODE_PEPPER=${GAMIFICATION_CODE_PEPPER:?GAMIFICATION_CODE_PEPPER is required}
      - HIEVENTS_API_URL=${HIEVENTS_API_URL}
      - HIEVENTS_API_KEY=${HIEVENTS_API_KEY}
      - HIEVENTS_EVENT_ID=${HIEVENTS_EVENT_ID}
      - HIEVENTS_EMAIL=${HIEVENTS_EMAIL}
      - HIEVENTS_PASSWORD=${HIEVENTS_PASSWORD}
      - HIEVENTS_ACCOUNT_ID=${HIEVENTS_ACCOUNT_ID}
      - HIEVENTS_REQUEST_TIMEOUT_MS=${HIEVENTS_REQUEST_TIMEOUT_MS:-10000}
      - HIEVENTS_MAX_RETRIES=${HIEVENTS_MAX_RETRIES:-2}
      - HIEVENTS_RETRY_BASE_MS=${HIEVENTS_RETRY_BASE_MS:-200}
      - HIEVENTS_STATUS_STALE_MS=${HIEVENTS_STATUS_STALE_MS:-21600000}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000/",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  pocketbase:
    build:
      context: ./pocketbase
      dockerfile: Dockerfile
    environment:
      - PB_SUPERUSER_EMAIL=${POCKETBASE_SUPERUSER_EMAIL}
      - PB_SUPERUSER_PASSWORD=${POCKETBASE_SUPERUSER_PASSWORD}
      - LISTMONK_USERNAME=${LISTMONK_USERNAME}
      - LISTMONK_API_TOKEN=${LISTMONK_API_TOKEN}
      - LISTMONK_PASSWORD=${LISTMONK_PASSWORD}
      - LISTMONK_URL=${LISTMONK_URL}
      - LISTMONK_LIST_ID=${LISTMONK_LIST_ID}
      - CFP_DAILY_REPORT_RECIPIENT=${CFP_DAILY_REPORT_RECIPIENT}
      - CFP_DAILY_REPORT_FORCE=${CFP_DAILY_REPORT_FORCE}
      - HIEVENTS_API_URL=${HIEVENTS_API_URL}
      - HIEVENTS_EVENT_ID=${HIEVENTS_EVENT_ID}
      - HIEVENTS_EMAIL=${HIEVENTS_EMAIL}
      - HIEVENTS_PASSWORD=${HIEVENTS_PASSWORD}
      - HIEVENTS_ACCOUNT_ID=${HIEVENTS_ACCOUNT_ID}
    volumes:
      # Persistent storage for PocketBase data
      - pocketbase_data:/pb/pb_data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8090/api/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pocketbase_data:
    # This ensures data persistence between deployments

networks:
  default:
    name: wts_network
